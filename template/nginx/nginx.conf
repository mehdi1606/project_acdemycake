server {
    listen 80;
    server_name _;              # Accepts any IP or hostname

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip compression ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── React SPA — serve index.html for all unknown routes ────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Spring Boot backend (internal Docker DNS) ──
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 100M;
    }

    # ── File serving proxy → Spring Boot backend ───────────────
    location /files/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # ── WebSocket proxy → Spring Boot backend ──────────────────
    location /ws/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Cache static assets ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
