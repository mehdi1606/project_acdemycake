server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: cake-design-academy

  config:
    import: "optional:env:"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:academy_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        transport:
          protocol: smtp

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true

# Application Configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000  # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days

  email:
    from: ${EMAIL_FROM}
    from-name: Cake Design Academy

  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    full-name: ${ADMIN_FULL_NAME:Administrator}

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    base-url: ${FILE_BASE_URL:http://localhost:8080}
    max-size: 10485760  # 10MB

  subscription:
    yearly-price: 1200.00
    currency: MAD
    platform-fee-percentage: 20

# MUX Configuration
mux:
  token-id: ${MUX_TOKEN_ID:}
  token-secret: ${MUX_TOKEN_SECRET:}
  signing-key-id: ${MUX_SIGNING_KEY_ID:}
  signing-private-key: ${MUX_SIGNING_PRIVATE_KEY:}
  webhook-secret: ${MUX_WEBHOOK_SECRET:}

# PayZone Configuration
payzone:
  api-url: ${PAYZONE_API_URL:https://api.payzone.ma}
  merchant-id: ${PAYZONE_MERCHANT_ID:}
  api-key: ${PAYZONE_API_KEY:}
  secret-key: ${PAYZONE_SECRET_KEY:}
  callback-url: ${PAYZONE_CALLBACK_URL:http://localhost:8080/api/v1/payments/webhook}
  return-url: ${PAYZONE_RETURN_URL:http://localhost:3000/payment/callback}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    root: INFO
    com.academy: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.academy: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.academy: INFO

springdoc:
  swagger-ui:
    enabled: false
